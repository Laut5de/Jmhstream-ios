name: Build JMHStream IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      EXPO_NO_TELEMETRY: 1
      EXPO_NO_DOCTOR: 1
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund

      - name: Expo Prebuild
        working-directory: mobile
        run: npx expo prebuild --clean --platform ios --non-interactive

      - name: Bundle JS manually
        working-directory: mobile
        run: |
          mkdir -p /tmp/rn-bundle/assets
          node node_modules/.bin/react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/rn-bundle/main.jsbundle \
            --assets-dest /tmp/rn-bundle/assets
          echo "Bundle: $(du -sh /tmp/rn-bundle/main.jsbundle)"
          echo "Assets: $(ls /tmp/rn-bundle/assets | wc -l) files"

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Build Archive (SKIP bundle phase)
        working-directory: mobile/ios
        env:
          SKIP_BUNDLING: 1
        run: |
          set -o pipefail
          xcodebuild \
            -workspace JMHStream.xcworkspace \
            -scheme JMHStream \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/JMHStream.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            2>&1 | tee build-output.txt || (tail -100 build-output.txt && exit 1)

      - name: Inject bundle + package IPA
        working-directory: mobile/ios
        run: |
          echo '=== Archive structure ==='
          find build/JMHStream.xcarchive -type d | head -20
          echo ''
          echo '=== Finding .app ==='
          APP=$(find build/ -name '*.app' -type d | head -1)
          echo "App found: $APP"
          if [ -z "$APP" ]; then
            echo 'ERROR: No .app found in archive!'
            exit 1
          fi
          cp /tmp/rn-bundle/main.jsbundle "$APP/main.jsbundle"
          mkdir -p "$APP/assets"
          rsync -a /tmp/rn-bundle/assets/ "$APP/assets/" 2>/dev/null || true
          echo "Bundle injected: $(ls -lh $APP/main.jsbundle)"
          mkdir -p build/Payload
          cp -r "$APP" build/Payload/
          cd build && zip -r JMHStream-unsigned.ipa Payload/
          echo "IPA: $(du -sh JMHStream-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JMHStream-RN-IPA
          path: mobile/ios/build/JMHStream-unsigned.ipa
          retention-days: 30
