name: Build JMHStream IPA

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build-ios:
      name: Build iOS IPA (React Native - GBox)
      runs-on: macos-latest
      timeout-minutes: 90

      env:
        EXPO_NO_TELEMETRY: 1
        EXPO_NO_DOCTOR: 1
        CI: true
        NODE_OPTIONS: '--max-old-space-size=4096'

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: mobile/package.json

        - name: Install dependencies
          working-directory: mobile
          run: npm install --no-audit --no-fund

        - name: Run Expo Prebuild (non-interactive)
          working-directory: mobile
          run: npx expo prebuild --clean --platform ios --non-interactive

        - name: Bundle JavaScript manually (full output)
          working-directory: mobile
          run: |
            echo '=== Bundling JS ==='
            mkdir -p /tmp/rn-bundle/assets
            node node_modules/.bin/react-native bundle \
              --platform ios \
              --dev false \
              --entry-file index.js \
              --bundle-output /tmp/rn-bundle/main.jsbundle \
              --assets-dest /tmp/rn-bundle/assets \
              --reset-cache
            echo "Bundle: $(du -sh /tmp/rn-bundle/main.jsbundle)"
            echo "Assets: $(ls /tmp/rn-bundle/assets 2>/dev/null | wc -l) files"

        - name: Install CocoaPods
          working-directory: mobile/ios
          run: pod install

        - name: Build Archive (SKIP bundle phase)
          working-directory: mobile/ios
          env:
            SKIP_BUNDLING: 1
          run: |
            set -o pipefail
            xcodebuild \
              -workspace JMHStream.xcworkspace \
              -scheme JMHStream \
              -configuration Release \
              -sdk iphoneos \
              -archivePath $PWD/build/JMHStream.xcarchive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_BITCODE=NO \
              2>&1 | tee build-output.txt || (echo '--- FAIL TAIL ---' && tail -100 build-output.txt && exit 1)

        - name: Inject bundle + package IPA
          working-directory: mobile/ios
          run: |
            APP=$(find build/JMHStream.xcarchive/Products/Applications -name '*.app' | head -1)
            echo "Injecting into: $APP"
            cp /tmp/rn-bundle/main.jsbundle "$APP/main.jsbundle"
            mkdir -p "$APP/assets"
            rsync -a /tmp/rn-bundle/assets/ "$APP/assets/" 2>/dev/null || true
            echo "Bundle injected: $(ls -lh $APP/main.jsbundle)"
            mkdir -p build/Payload
            cp -r "$APP" build/Payload/
            cd build && zip -r JMHStream-unsigned.ipa Payload/
            echo "IPA: $(du -sh JMHStream-unsigned.ipa)"

        - name: Upload IPA artifact
          uses: actions/upload-artifact@v4
          with:
            name: JMHStream-RN-IPA
            path: mobile/ios/build/JMHStream-unsigned.ipa
            retention-days: 30

        - name: Done
          run: echo '## IPA Ready - download and install with GBox!' >> $GITHUB_STEP_SUMMARY
  