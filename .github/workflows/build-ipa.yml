name: Build JMHStream IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA (React Native - GBox)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Run Expo Prebuild
        working-directory: mobile
        run: npx expo prebuild --clean --platform ios
        env:
          CI: 1

      - name: Write .xcode.env.local (official Expo node fix)
        working-directory: mobile/ios
        run: |
          echo "NODE_BINARY=$(which node)" > .xcode.env.local
          echo "Written:"
          cat .xcode.env.local

      - name: Test bundle manually (diagnose errors)
        working-directory: mobile
        run: |
          mkdir -p /tmp/rn-assets
          node node_modules/.bin/react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/main.jsbundle \
            --assets-dest /tmp/rn-assets 2>&1
          echo "Bundle exit: $?"
          ls -lh /tmp/main.jsbundle || echo 'Bundle file not created'

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Build Archive (unsigned)
        working-directory: mobile/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace JMHStream.xcworkspace \
            -scheme JMHStream \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/JMHStream.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            2>&1 | tee build-output.txt || (echo '--- LAST 200 LINES ---' && tail -200 build-output.txt && exit 1)

      - name: Package unsigned IPA
        working-directory: mobile/ios
        run: |
          mkdir -p build/Payload
          APP=$(find build/JMHStream.xcarchive/Products/Applications -name '*.app' | head -1)
          echo "App: $APP"
          cp -r "$APP" build/Payload/
          cd build && zip -r JMHStream-unsigned.ipa Payload/
          echo "IPA size: $(du -sh JMHStream-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: JMHStream-RN-IPA
          path: mobile/ios/build/JMHStream-unsigned.ipa
          retention-days: 30

      - name: Done
        run: echo '## JMHStream IPA Ready!' >> $GITHUB_STEP_SUMMARY
