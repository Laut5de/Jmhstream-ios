name: Build JMHStream IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA (React Native - GBox ready)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Run Expo Prebuild (generates iOS Xcode project)
        working-directory: mobile
        run: npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Build Archive (unsigned)
        working-directory: mobile/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace JMHStream.xcworkspace \
            -scheme JMHStream \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $(pwd)/build/JMHStream.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            archive | xcpretty

      - name: Package unsigned IPA (for GBox)
        working-directory: mobile/ios
        run: |
          mkdir -p build/Payload
          APP=$(find build/JMHStream.xcarchive/Products/Applications -name "*.app" | head -1)
          echo "App: $APP"
          cp -r "$APP" build/Payload/
          cd build
          zip -r JMHStream-unsigned.ipa Payload/
          echo "IPA size: $(du -sh JMHStream-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JMHStream-RN-IPA
          path: mobile/ios/build/JMHStream-unsigned.ipa
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "React Native IPA built successfully." >> $GITHUB_STEP_SUMMARY
          echo "Download from Artifacts and import into GBox to install on iPhone." >> $GITHUB_STEP_SUMMARY
