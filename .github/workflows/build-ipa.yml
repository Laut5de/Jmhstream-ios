name: Build JMHStream IPA

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build-ios:
      name: Build iOS IPA (React Native - GBox ready)
      runs-on: macos-latest
      timeout-minutes: 90

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: mobile/package.json

        - name: Show Xcode and Node version
          run: |
            xcodebuild -version
            node --version
            npm --version
            which node

        - name: Install dependencies
          working-directory: mobile
          run: npm install

        - name: Run Expo Prebuild (generates iOS Xcode project)
          working-directory: mobile
          run: npx expo prebuild --clean --platform ios
          env:
            CI: 1

        - name: Install CocoaPods
          working-directory: mobile/ios
          run: pod install

        - name: Build Archive (unsigned)
          working-directory: mobile/ios
          run: |
            NODE_BIN=$(which node)
            echo "Using node: $NODE_BIN"
            xcodebuild \
              -workspace JMHStream.xcworkspace \
              -scheme JMHStream \
              -configuration Release \
              -sdk iphoneos \
              -archivePath $(pwd)/build/JMHStream.xcarchive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_BITCODE=NO \
              NODE_BINARY="$NODE_BIN" \
              2>&1 | tee build-output.txt; BUILD_EXIT=${PIPESTATUS[0]}
            if [ $BUILD_EXIT -ne 0 ]; then
              echo "=== BUILD FAILED — last 100 lines ==="
              tail -100 build-output.txt
              exit $BUILD_EXIT
            fi

        - name: Package unsigned IPA (for GBox)
          working-directory: mobile/ios
          run: |
            mkdir -p build/Payload
            APP=$(find build/JMHStream.xcarchive/Products/Applications -name "*.app" | head -1)
            echo "App: $APP"
            cp -r "$APP" build/Payload/
            cd build
            zip -r JMHStream-unsigned.ipa Payload/
            echo "IPA size: $(du -sh JMHStream-unsigned.ipa)"

        - name: Upload IPA
          uses: actions/upload-artifact@v4
          with:
            name: JMHStream-RN-IPA
            path: mobile/ios/build/JMHStream-unsigned.ipa
            retention-days: 30

        - name: Build summary
          run: |
            echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "React Native IPA built successfully." >> $GITHUB_STEP_SUMMARY
            echo "Download from Artifacts and import into GBox to install on iPhone." >> $GITHUB_STEP_SUMMARY
  